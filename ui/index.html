<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodSight 聲見 - 聽見弦外之音，看見核心觀點</title>
    <meta name="description" content="將 Podcast 轉為可搜尋、可摘要的知識庫。AI 自動轉錄與摘要財經節目。">
    <link rel="icon" type="image/jpeg" href="/assets/PodSight-Logo-cropped.jpeg">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --bg-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent: #f59e0b;
            --accent-hover: #fbbf24;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
            --border: #333333;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.125rem;
        }

        .logo-tagline {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border-radius: 9999px;
            font-size: 0.875rem;
        }

        /* Podcast Selector */
        .podcast-selector {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .podcast-select {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .podcast-select:hover {
            border-color: var(--accent);
        }

        .podcast-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .podcast-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Layout */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
        }

        @media (max-width: 1200px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--shadow);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.accent {
            color: var(--accent);
        }

        /* Pipeline Controls */
        .pipeline-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        /* Lucide icon styling */
        [data-lucide] {
            display: inline-block;
            vertical-align: middle;
            flex-shrink: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #ea580c 100%);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            justify-content: center;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Step indicators */
        .pipeline-steps {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .step {
            flex: 1;
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: 10px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .step:hover {
            background: var(--bg-hover);
        }

        .step.active {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(234, 88, 12, 0.2) 100%);
            border: 1px solid var(--accent);
        }

        .step.completed {
            background: rgba(34, 197, 94, 0.1);
        }

        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .step.completed .step-number {
            background: var(--success);
            color: var(--bg-primary);
        }

        .step.active .step-number {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .step-label {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        /* Episode List */
        .episode-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .episode-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .episode-item:hover {
            background: var(--bg-tertiary);
        }

        .episode-item:last-child {
            border-bottom: none;
        }

        .episode-number {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--accent);
            min-width: 60px;
        }

        .episode-title {
            flex: 1;
            font-size: 0.9375rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-badges {
            display: flex;
            gap: 0.375rem;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-transcript {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .badge-summary {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent);
        }

        /* Search */
        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Search Results */
        .search-results {
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .search-result {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .search-result:hover {
            background: var(--bg-tertiary);
        }

        .search-result-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .search-result-ep {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .search-result-time {
            color: var(--text-muted);
            font-size: 0.8125rem;
            font-family: monospace;
        }

        .search-result-text {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            line-height: 1.5;
        }

        .search-result-text mark {
            background: rgba(245, 158, 11, 0.3);
            color: var(--accent);
            padding: 0.125rem 0.25rem;
            border-radius: 3px;
        }

        /* Episode Viewer */
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .viewer-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .viewer-ep {
            color: var(--accent);
            font-size: 0.875rem;
        }

        .viewer-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .copy-buttons, .edit-buttons {
            margin-left: auto;
            display: flex;
            gap: 0.375rem;
        }

        .edit-textarea {
            width: 100%;
            min-height: 400px;
            padding: 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9375rem;
            line-height: 1.6;
            resize: vertical;
        }

        .edit-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-small {
            padding: 0.375rem 0.75rem;
            font-size: 0.8125rem;
        }

        .copy-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            z-index: 1000;
            animation: fadeInOut 2s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        .tab {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: inherit;
        }

        .tab:hover {
            background: var(--bg-tertiary);
        }

        .tab.active {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* Audio Player */
        .audio-player {
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .audio-btn {
            background: var(--bg-hover);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            transition: background 0.2s;
        }

        .audio-btn:hover {
            background: var(--accent);
        }

        .audio-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
            min-width: 40px;
            font-family: monospace;
        }

        .audio-progress {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--bg-hover);
            border-radius: 3px;
            cursor: pointer;
        }

        .audio-progress::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .audio-speed {
            background: var(--bg-hover);
            border: none;
            border-radius: 6px;
            padding: 0.25rem 0.5rem;
            color: var(--text-primary);
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Clickable timestamps */
        .timestamp {
            color: var(--accent);
            cursor: pointer;
            font-family: monospace;
        }

        .timestamp:hover {
            text-decoration: underline;
        }

        .viewer-content {
            max-height: 600px;
            overflow-y: auto;
            font-size: 0.9375rem;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
            color: var(--text-secondary);
        }

        .viewer-content .timestamp {
            color: var(--accent);
            font-family: monospace;
            font-size: 0.8125rem;
        }

        /* Markdown styles for summary */
        .viewer-content.markdown {
            white-space: normal;
        }

        .viewer-content.markdown h1,
        .viewer-content.markdown h2,
        .viewer-content.markdown h3 {
            color: var(--text-primary);
            margin: 1rem 0 0.5rem 0;
            font-weight: 600;
        }

        .viewer-content.markdown h1 { font-size: 1.25rem; }
        .viewer-content.markdown h2 { font-size: 1.125rem; color: var(--accent); }
        .viewer-content.markdown h3 { font-size: 1rem; }

        .viewer-content.markdown p {
            margin: 0.5rem 0;
        }

        .viewer-content.markdown ul,
        .viewer-content.markdown ol {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .viewer-content.markdown li {
            margin: 0.25rem 0;
        }

        .viewer-content.markdown strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .viewer-content.markdown code {
            background: var(--bg-tertiary);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.875rem;
        }

        /* Terminal Output */
        .terminal {
            background: #0d0d0d;
            border-radius: 10px;
            padding: 1rem;
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            font-size: 0.8125rem;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }

        .terminal-line {
            color: var(--text-secondary);
        }

        .terminal-line.success {
            color: var(--success);
        }

        .terminal-line.error {
            color: var(--error);
        }

        .terminal-line.info {
            color: var(--accent);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: slideIn 0.3s ease-out;
        }

        /* Loading spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Episode filter dropdown */
        .filter-select {
            padding: 0.375rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.8125rem;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .filter-select:hover {
            border-color: var(--accent);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .filter-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* Clickable stat card */
        .stat-card.clickable {
            cursor: pointer;
        }

        .stat-card.clickable:hover {
            border-color: var(--accent);
        }

        /* Cost breakdown modal */
        .cost-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .cost-modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .cost-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .cost-modal-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .cost-section {
            margin-bottom: 1rem;
        }

        .cost-section-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .cost-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .cost-row:last-child {
            border-bottom: none;
        }

        .cost-provider {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cost-free {
            color: var(--success);
            font-size: 0.75rem;
            background: rgba(34, 197, 94, 0.1);
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
        }

        .cost-amount {
            font-weight: 600;
            font-family: monospace;
        }

        .cost-note {
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        /* Pipeline Progress Bar */
        .pipeline-progress {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: 10px;
        }

        .progress-bar-container {
            height: 8px;
            background: var(--bg-hover);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, #22c55e 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
            position: relative;
        }

        .progress-bar.indeterminate {
            width: 30%;
            animation: indeterminate 1.5s ease-in-out infinite;
        }

        @keyframes indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .progress-step-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-percent {
            font-weight: 600;
            color: var(--accent);
        }

        /* Stock ticker tags */
        .ticker-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .ticker-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 6px;
            font-size: 0.8125rem;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
        }

        .ticker-tag:hover {
            background: rgba(245, 158, 11, 0.2);
            border-color: var(--accent);
        }

        .ticker-tag.etf {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .ticker-tag.etf:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: var(--success);
        }

        .ticker-tag-label {
            font-size: 0.6875rem;
            opacity: 0.7;
        }

        /* Theme toggle button */
        .theme-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        /* Light theme variables */
        [data-theme="light"] {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f3f4;
            --bg-hover: #e8eaed;
            --text-primary: #1a1a1a;
            --text-secondary: #5f6368;
            --text-muted: #9aa0a6;
            --border: #dadce0;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="light"] header {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        }

        [data-theme="light"] .terminal {
            background: #f1f3f4;
        }

        [data-theme="light"] .logo h1 {
            background: linear-gradient(90deg, #1a1a1a 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <script>
        const API_BASE = window.location.origin;
        let currentEpisode = null;
        let currentTab = 'transcript';
        let episodesData = [];
        let currentPodcast = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Lucide icons
            lucide.createIcons();

            // Load saved theme preference
            initTheme();

            checkServerStatus();
            loadPodcasts();
            checkRunningPipeline();
            setInterval(checkServerStatus, 30000);

            // Global keyboard shortcuts
            document.addEventListener('keydown', handleKeyboardShortcuts);
        });

        // Theme toggle
        function initTheme() {
            const savedTheme = localStorage.getItem('podsight-theme') || 'dark';
            setTheme(savedTheme);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('podsight-theme', theme);

            // Update toggle icon
            const lightIcon = document.getElementById('themeIconLight');
            const darkIcon = document.getElementById('themeIconDark');

            if (theme === 'light') {
                lightIcon.style.display = 'block';
                darkIcon.style.display = 'none';
            } else {
                lightIcon.style.display = 'none';
                darkIcon.style.display = 'block';
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        }

        // Keyboard shortcuts handler
        let selectedEpisodeIndex = -1;
        function handleKeyboardShortcuts(e) {
            // Ignore if typing in an input/textarea
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                // Allow Escape to blur
                if (e.key === 'Escape') {
                    e.target.blur();
                }
                return;
            }

            const filteredEpisodes = getFilteredEpisodes();

            switch (e.key) {
                case '/':
                    // Focus search input
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                    break;

                case 'j':
                    // Navigate to next episode
                    e.preventDefault();
                    if (filteredEpisodes.length > 0) {
                        selectedEpisodeIndex = Math.min(selectedEpisodeIndex + 1, filteredEpisodes.length - 1);
                        const ep = filteredEpisodes[selectedEpisodeIndex];
                        const hasEpNumber = ep.episode_number !== null && ep.episode_number !== undefined;
                        const identifier = hasEpNumber ? ep.episode_number : (ep.filename || '');
                        loadEpisode(identifier);
                        highlightSelectedEpisode();
                    }
                    break;

                case 'k':
                    // Navigate to previous episode
                    e.preventDefault();
                    if (filteredEpisodes.length > 0 && selectedEpisodeIndex > 0) {
                        selectedEpisodeIndex = Math.max(selectedEpisodeIndex - 1, 0);
                        const ep = filteredEpisodes[selectedEpisodeIndex];
                        const hasEpNumber = ep.episode_number !== null && ep.episode_number !== undefined;
                        const identifier = hasEpNumber ? ep.episode_number : (ep.filename || '');
                        loadEpisode(identifier);
                        highlightSelectedEpisode();
                    }
                    break;

                case ' ':
                    // Play/pause audio (only if audio player is visible)
                    if (document.getElementById('audioPlayer').style.display !== 'none') {
                        e.preventDefault();
                        togglePlayPause();
                    }
                    break;

                case 'ArrowLeft':
                    // Skip back 10 seconds
                    if (document.getElementById('audioPlayer').style.display !== 'none') {
                        e.preventDefault();
                        skipAudio(-10);
                    }
                    break;

                case 'ArrowRight':
                    // Skip forward 10 seconds
                    if (document.getElementById('audioPlayer').style.display !== 'none') {
                        e.preventDefault();
                        skipAudio(10);
                    }
                    break;

                case '1':
                    // Show transcript tab
                    e.preventDefault();
                    showTab('transcript');
                    break;

                case '2':
                    // Show summary tab
                    e.preventDefault();
                    showTab('summary');
                    break;

                case '?':
                    // Show keyboard shortcuts help
                    e.preventDefault();
                    showShortcutsHelp();
                    break;
            }
        }

        function highlightSelectedEpisode() {
            document.querySelectorAll('.episode-item').forEach((item, index) => {
                item.style.background = index === selectedEpisodeIndex ? 'var(--bg-hover)' : '';
            });
        }

        function showShortcutsHelp() {
            const shortcuts = [
                '/ - 搜尋',
                'j - 下一集',
                'k - 上一集',
                '空白鍵 - 播放/暫停',
                '← - 倒退 10 秒',
                '→ - 快轉 10 秒',
                '1 - 顯示逐字稿',
                '2 - 顯示摘要',
                '? - 顯示此說明'
            ];
            alert('⌨️ 鍵盤快捷鍵\n\n' + shortcuts.join('\n'));
        }

        // Cost tracking
        let costData = null;

        async function loadCostData() {
            try {
                const res = await fetch(`${API_BASE}/stats/cost`);
                costData = await res.json();
                updateCostDisplay();
            } catch (err) {
                document.getElementById('estimatedCost').textContent = '-';
            }
        }

        function updateCostDisplay() {
            if (!costData) return;

            // Get currently selected providers
            const transcribeProvider = document.getElementById('transcribeProvider')?.value || 'groq';
            const summaryProvider = document.getElementById('summaryProvider')?.value || 'gemini';

            // Map provider names to cost keys
            const transcribeCostMap = {
                'groq': 'groq',
                'openai': 'openai_whisper',
                'local': 'local'
            };
            const summaryCostMap = {
                'gemini': 'gemini',
                'anthropic': 'claude',
                'openai': 'openai_gpt4o'
            };

            const transcribeCost = costData.estimated_costs_usd.transcription[transcribeCostMap[transcribeProvider]] || 0;
            const summaryCost = costData.estimated_costs_usd.summarization[summaryCostMap[summaryProvider]] || 0;
            const totalCost = transcribeCost + summaryCost;

            document.getElementById('estimatedCost').textContent =
                totalCost === 0 ? '$0 免費' : `~$${totalCost.toFixed(2)}`;
        }

        // Stock ticker extraction
        function extractTickers(text) {
            if (!text) return [];

            const seen = new Set();
            const tickers = [];

            function addTicker(code, type, name = null) {
                if (!seen.has(code)) {
                    seen.add(code);
                    tickers.push({ code, type, name });
                }
            }

            // Taiwan stock codes: 4-digit numbers (2330, 2317, etc.)
            const twStockRegex = /[（(](\d{4})[）)]/g;
            let match;
            while ((match = twStockRegex.exec(text)) !== null) {
                addTicker(match[1], 'tw_stock');
            }

            // Taiwan ETF codes: 4-digit starting with 00 (0050, 0056, 00878)
            const twEtfRegex = /\b(00\d{2,3})\b/g;
            while ((match = twEtfRegex.exec(text)) !== null) {
                addTicker(match[1], 'tw_etf');
            }

            // US stock symbols: $TSLA, $AAPL
            const usStockRegex = /\$([A-Z]{1,5})\b/g;
            while ((match = usStockRegex.exec(text)) !== null) {
                addTicker(match[1], 'us_stock');
            }

            // Common Taiwan stock names with codes
            const knownStocks = {
                '台積電': '2330',
                '鴻海': '2317',
                '聯發科': '2454',
                '廣達': '2382',
                '台達電': '2308',
                '緯創': '3231',
                '中華電': '2412',
                '國泰金': '2882',
                '富邦金': '2881',
                '長榮': '2603',
                '陽明': '2609',
                'Nvidia': 'NVDA',
                'NVIDIA': 'NVDA',
                '輝達': 'NVDA',
                'Apple': 'AAPL',
                '蘋果': 'AAPL',
                'Tesla': 'TSLA',
                '特斯拉': 'TSLA',
                'AMD': 'AMD',
                'Intel': 'INTC',
                '英特爾': 'INTC'
            };

            for (const [name, code] of Object.entries(knownStocks)) {
                if (text.includes(name)) {
                    const type = /^\d+$/.test(code) ? 'tw_stock' : 'us_stock';
                    addTicker(code, type, name);
                }
            }

            return tickers;
        }

        function renderTickerTags(tickers) {
            const container = document.getElementById('tickerTags');
            if (!tickers || tickers.length === 0) {

        // Format date-based title: 2026_2_5_四_硬體股... → 20260205_硬體股...
        function formatDateTitle(title, shortDate = false) {
            if (!title) return null;
            // Match pattern: YYYY_M_D_weekday_rest
            const match = title.match(/^(\d{4})_(\d{1,2})_(\d{1,2})_[一二三四五六日]_(.+)$/);
            if (match) {
                const [, year, month, day, rest] = match;
                const formattedDate = `${year}${month.padStart(2, '0')}${day.padStart(2, '0')}`;
                return shortDate ? formattedDate : `${formattedDate}_${rest}`;
            }
            return title;
        }

        // Audio player functions
        window.audioElement = document.getElementById('audioElement');
        let isPlaying = false;

        function loadAudio(filename) {
            const audioPlayer = document.getElementById('audioPlayer');
            const audioUrl = `${API_BASE}/audio/${filename}`;

            // Reset state
            isPlaying = false;
            updatePlayButton();
            document.getElementById('currentTime').textContent = '0:00';
            document.getElementById('duration').textContent = '0:00';
            document.getElementById('audioProgress').value = 0;

            // Remove old event listeners by cloning
            const newAudio = audioElement.cloneNode(true);
            audioElement.parentNode.replaceChild(newAudio, audioElement);
            window.audioElement = newAudio;

            newAudio.src = audioUrl;
            audioPlayer.style.display = 'block';
            lucide.createIcons();

            newAudio.addEventListener('loadedmetadata', () => {
                document.getElementById('duration').textContent = formatTime(newAudio.duration);
            });

            newAudio.addEventListener('timeupdate', () => {
                const progress = (newAudio.currentTime / newAudio.duration) * 100;
                document.getElementById('audioProgress').value = progress;
                document.getElementById('currentTime').textContent = formatTime(newAudio.currentTime);
            });

            newAudio.addEventListener('ended', () => {
                isPlaying = false;
                updatePlayButton();
            });

            newAudio.addEventListener('error', () => {
                audioPlayer.style.display = 'none';
            });
        }

        function togglePlayPause() {
            if (isPlaying) {
                window.audioElement.pause();
            } else {
                window.audioElement.play();
            }
            isPlaying = !isPlaying;
            updatePlayButton();
        }

        function updatePlayButton() {
            const playIcon = document.getElementById('playIcon');
            playIcon.setAttribute('data-lucide', isPlaying ? 'pause' : 'play');
            lucide.createIcons();
        }

        function seekAudio(value) {
            const time = (value / 100) * window.audioElement.duration;
            window.audioElement.currentTime = time;
        }

        function skipAudio(seconds) {
            window.audioElement.currentTime = Math.max(0, Math.min(window.audioElement.duration, window.audioElement.currentTime + seconds));
        }

        function setPlaybackSpeed(speed) {
            window.audioElement.playbackRate = parseFloat(speed);
        }

        function seekToTimestamp(timestamp) {
            // Parse timestamp like "12:34" or "1:23:45"
            const parts = timestamp.split(':').map(Number);
            let seconds = 0;
            if (parts.length === 2) {
                seconds = parts[0] * 60 + parts[1];
            } else if (parts.length === 3) {
                seconds = parts[0] * 3600 + parts[1] * 60 + parts[2];
            }
            window.audioElement.currentTime = seconds;
            if (!isPlaying) {
                window.audioElement.play();
                isPlaying = true;
                updatePlayButton();
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Copy content to clipboard
        function copyContent(plainText = false) {
            if (!currentEpisode) return;

            const content = currentTab === 'transcript' ? currentEpisode.transcript : currentEpisode.summary;
            if (!content) return;

            let textToCopy = content;

            // Strip markdown if plain text requested
            if (plainText && currentTab === 'summary') {
                textToCopy = content
                    .replace(/#{1,6}\s*/g, '')           // Remove headers
                    .replace(/\*\*([^*]+)\*\*/g, '$1')   // Remove bold
                    .replace(/\*([^*]+)\*/g, '$1')       // Remove italic
                    .replace(/`([^`]+)`/g, '$1')         // Remove code
                    .replace(/^[\*\-]\s+/gm, '• ')       // Convert list markers
                    .replace(/\n{3,}/g, '\n\n')          // Reduce multiple newlines
                    .trim();
            }

            navigator.clipboard.writeText(textToCopy).then(() => {
                showCopyToast(plainText ? '已複製純文字' : '已複製');
            }).catch(err => {
                console.error('Copy failed:', err);
            });
        }

        function showCopyToast(message) {
            // Remove existing toast
            const existing = document.querySelector('.copy-toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'copy-toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 2000);
        }

        // Download content as TXT file
        function downloadContent() {
            if (!currentEpisode) return;

            const content = currentTab === 'transcript' ? currentEpisode.transcript : currentEpisode.summary;
            if (!content) {
                showCopyToast(`沒有${currentTab === 'transcript' ? '逐字稿' : '摘要'}可下載`);
                return;
            }

            // Generate filename
            const hasEpNum = currentEpisode.episode_number !== null && currentEpisode.episode_number !== undefined;
            const epIdentifier = hasEpNum
                ? `EP${String(currentEpisode.episode_number).padStart(4, '0')}`
                : (currentEpisode.filename || 'episode');
            const suffix = currentTab === 'transcript' ? '逐字稿' : '摘要';
            const filename = `${epIdentifier}_${suffix}.txt`;

            // Create blob and download
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showCopyToast(`已下載 ${filename}`);
        }

        // Search
        let searchTimeout;
        function handleSearch(event) {
            clearTimeout(searchTimeout);
            const query = event.target.value.trim();

            if (event.key === 'Enter' && query) {
                performSearch(query);
            } else if (query.length >= 2) {
                searchTimeout = setTimeout(() => performSearch(query), 300);

                document.getElementById('searchResults').innerHTML = '';

        async function performSearch(query) {
            const results = document.getElementById('searchResults');
            results.innerHTML = '<div class="spinner"></div>';

            try {
                const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&limit=20`);
                const data = await res.json();

                if (!data.results?.length) {
                    results.innerHTML = `<div class="empty-state"><p>找不到「${query}」</p></div>`;
                    return;
                }

                results.innerHTML = data.results.map(r => `
                    <div class="search-result" onclick="loadEpisode(${r.episode})">
                        <div class="search-result-header">
                            <span class="search-result-ep">EP${r.episode}</span>
                            ${r.timestamp ? `<span class="search-result-time">[${r.timestamp}]</span>` : ''}
                        </div>
                        <div class="search-result-text">${highlightMatch(r.text, query)}</div>
                    </div>
                `).join('');
            } catch {
                results.innerHTML = `<div class="empty-state"><p>搜尋失敗</p></div>`;
            }
        }

        function highlightMatch(text, query) {
            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(escaped, 'gi'), '<mark>$&</mark>');
        }

        // Pipeline execution
        let statusPollingInterval = null;
        let lastOutputCount = 0;

        async function runPipeline(step) {
            const terminal = document.getElementById('terminal');
            document.getElementById('terminalCard').style.display = 'block';

            const stepName = {
                'all': '完整 Pipeline',
                'check': '檢查新集數',
                1: '解析 RSS',
                2: '下載音訊',
                3: '語音轉錄',
                4: 'AI 摘要'
            }[step];

            // Clear terminal
            terminal.innerHTML = '';
            addTerminalLine(`啟動 ${stepName}...`, 'info');

            // Highlight the active step
            if (typeof step === 'number') {
                document.querySelectorAll('.step').forEach(s => s.classList.remove('active', 'completed'));
                document.getElementById(`step${step}`).classList.add('active');
            }

            // Disable buttons while running
            setButtonsDisabled(true);

            try {
                // Get selected providers
                const transcribeProvider = document.getElementById('transcribeProvider').value;
                const summaryProvider = document.getElementById('summaryProvider').value;

                const params = new URLSearchParams({
                    transcribe_provider: transcribeProvider,
                    summary_provider: summaryProvider
                });

                const res = await fetch(`${API_BASE}/run/${step}?${params}`, { method: 'POST' });
                const data = await res.json();

                if (!res.ok) {
                    addTerminalLine(`錯誤: ${data.detail}`, 'error');
                    setButtonsDisabled(false);
                    return;
                }

                addTerminalLine(`Pipeline 已啟動: ${data.name}`, 'success');
                addTerminalLine('', '');

                // Start polling for output
                lastOutputCount = 0;
                startStatusPolling();

            } catch (err) {
                addTerminalLine(`啟動失敗: ${err.message}`, 'error');
                setButtonsDisabled(false);
            }
        }

        function startStatusPolling() {
            if (statusPollingInterval) {
                clearInterval(statusPollingInterval);
            }

            statusPollingInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/run/status`);
                    const data = await res.json();

                    // Add new output lines
                    if (data.output && data.output.length > lastOutputCount) {
                        const newLines = data.output.slice(lastOutputCount);
                        newLines.forEach(line => {
                            addTerminalLine(line.text, line.level);
                        });
                        lastOutputCount = data.output.length;
                    }

                    // Update step indicators
                    if (data.current_step && typeof data.current_step === 'number') {
                        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
                        const stepEl = document.getElementById(`step${data.current_step}`);
                        if (stepEl) stepEl.classList.add('active');
                    }

                    // Update progress bar
                    updateProgressBar(data);

                    // Check if finished
                    if (!data.running) {
                        clearInterval(statusPollingInterval);
                        statusPollingInterval = null;
                        setButtonsDisabled(false);

                        // Mark completed steps
                        if (data.exit_code === 0) {
                            document.querySelectorAll('.step').forEach(s => {
                                s.classList.remove('active');
                                s.classList.add('completed');
                            });
                        }

                        // Refresh episode list
                        loadEpisodes();
                    }
                } catch (err) {
                    console.error('Status polling error:', err);
                }
            }, 1000);
        }

        async function stopPipeline() {
            try {
                const res = await fetch(`${API_BASE}/run/stop`, { method: 'POST' });
                if (res.ok) {
                    addTerminalLine('正在停止...', 'warning');
                }
            } catch (err) {
                addTerminalLine(`停止失敗: ${err.message}`, 'error');
            }
        }

        function setButtonsDisabled(disabled) {
            document.querySelectorAll('.pipeline-controls .btn').forEach(btn => {
                // Don't disable the stop button
                if (btn.id !== 'stopBtn') {
                    btn.disabled = disabled;
                }
            });
            document.querySelectorAll('.step').forEach(step => {
                step.style.pointerEvents = disabled ? 'none' : 'auto';
                step.style.opacity = disabled ? '0.5' : '1';
            });

            // Show/hide stop button and progress bar
            const stopBtn = document.getElementById('stopBtn');
            const progressEl = document.getElementById('pipelineProgress');
            if (stopBtn) {
                stopBtn.style.display = disabled ? 'inline-flex' : 'none';
            }
            if (progressEl) {
                progressEl.style.display = disabled ? 'block' : 'none';
                if (disabled) {
                    // Start with indeterminate progress
                    document.getElementById('progressBar').classList.add('indeterminate');
                    document.getElementById('progressBar').style.width = '30%';
                    document.getElementById('progressText').innerHTML = '<span class="progress-step-info"><span class="spinner" style="width:14px;height:14px;"></span> 準備中...</span><span class="progress-percent">0%</span>';
                }
            }
        }

        // Parse progress from output lines
        function parseProgressFromOutput(output) {
            let progress = { percent: 0, stepInfo: '處理中...', currentItem: '' };

            // Look for percentage patterns like "[5/28] (17%)" or "(45%)"
            for (let i = output.length - 1; i >= 0; i--) {
                const line = output[i].text || '';

                // Pattern: [X/Y] (Z%)
                const match = line.match(/\[(\d+)\/(\d+)\]\s*\((\d+)%\)/);
                if (match) {
                    const [, current, total, percent] = match;
                    progress.percent = parseInt(percent);
                    progress.currentItem = `${current}/${total}`;
                    break;
                }

                // Pattern: just (Z%)
                const percentMatch = line.match(/\((\d+)%\)/);
                if (percentMatch) {
                    progress.percent = parseInt(percentMatch[1]);
                    break;
                }

                // Pattern: Transcribing: EPXXXX
                const epMatch = line.match(/Transcribing:\s*(EP\d+|[^.]+)/);
                if (epMatch && !progress.currentItem) {
                    progress.currentItem = epMatch[1].slice(0, 20);
                }

                // Pattern: Summarizing EPXXXX
                const sumMatch = line.match(/Summarizing\s+(EP\d+|[^.]+)/);
                if (sumMatch && !progress.currentItem) {
                    progress.currentItem = sumMatch[1].slice(0, 20);
                }
            }

            return progress;
        }

        function updateProgressBar(data) {
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            if (!data.running) {
                progressBar.classList.remove('indeterminate');
                progressBar.style.width = data.exit_code === 0 ? '100%' : '0%';
                progressText.innerHTML = data.exit_code === 0
                    ? '<span class="progress-step-info"><i data-lucide="check" style="width:14px;height:14px;color:var(--success);"></i> 完成!</span><span class="progress-percent">100%</span>'
                    : '<span class="progress-step-info"><i data-lucide="x" style="width:14px;height:14px;color:var(--error);"></i> 已停止</span><span class="progress-percent">-</span>';
                lucide.createIcons();
                return;
            }

            const progress = parseProgressFromOutput(data.output);
            const stepName = data.step_name || '處理中';

            progressBar.classList.remove('indeterminate');
            progressBar.style.width = `${Math.max(progress.percent, 5)}%`;

            const itemInfo = progress.currentItem ? ` - ${progress.currentItem}` : '';
            progressText.innerHTML = `<span class="progress-step-info"><span class="spinner" style="width:14px;height:14px;"></span> ${stepName}${itemInfo}</span><span class="progress-percent">${progress.percent}%</span>`;
        }

        function addTerminalLine(text, type = '') {
            const terminal = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = `terminal-line ${type}`;
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function clearTerminal() {
            document.getElementById('terminal').innerHTML =
                '<div class="terminal-line info">準備就緒，點擊上方按鈕開始執行...</div>';
        }

        function refreshData() {
            loadEpisodes();
            addTerminalLine('資料已重新整理', 'success');
        }

        // Check for running pipeline on load
        async function checkRunningPipeline() {
            try {
                const res = await fetch(`${API_BASE}/run/status`);
                const data = await res.json();
                if (data.running) {
                    document.getElementById('terminalCard').style.display = 'block';
                    addTerminalLine('偵測到正在執行的 Pipeline...', 'info');
                    lastOutputCount = 0;
                    setButtonsDisabled(true);
                    startStatusPolling();
                }
            } catch (err) {
                // Ignore
            }
        }
    </script>
</body>
</html>
