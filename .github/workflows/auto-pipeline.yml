name: Auto Pipeline

on:
  schedule:
    # 10:00 AM Taiwan (UTC+8) = 02:00 UTC - catches YTH morning upload
    - cron: '0 2 * * *'
    # 7:00 PM Taiwan (UTC+8) = 11:00 UTC - catches ZH afternoon + Gooaye (Wed/Sat)
    - cron: '0 11 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Run auto pipeline
        id: pipeline
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python src/pipeline/auto_pipeline.py

      - name: Check for pending Telegram posts
        id: check_pending
        run: |
          if [ -f "data/.pending_telegram.json" ]; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "Found pending Telegram posts"
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "No pending Telegram posts"
          fi

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: auto-update $(date +'%Y-%m-%d %H:%M') UTC

          - New episodes processed
          - Summaries generated
          - Public site updated

          [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Wait for Vercel deployment
        if: steps.check_pending.outputs.has_pending == 'true'
        run: |
          echo "Waiting 3 minutes for Vercel to deploy..."
          sleep 180

      - name: Push to Telegram
        if: steps.check_pending.outputs.has_pending == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/pipeline/push_telegram_batch.py

      - name: Commit Telegram publish tracking
        if: steps.check_pending.outputs.has_pending == 'true'
        run: |
          git add data/**/social_drafts/.telegram_published
          if git diff --staged --quiet; then
            echo "No Telegram tracking changes to commit"
          else
            git commit -m "chore: update Telegram publish tracking [skip ci]"
            git pull --rebase origin main
            git push
          fi
